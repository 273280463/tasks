<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<!-- 稳定图标 -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">

<meta name="apple-mobile-web-app-title" content="小任务">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: -apple-system, BlinkMacSystemFont, sans-serif}
body{background:#f2f5fa;padding:15px;max-width:500px;margin:0 auto;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 1px 5px rgba(0,0,0,0.05)}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd;font-size:15px}
button{width:100%;background:#82d9b9;color:#fff;border:none;padding:14px;border-radius:12px;margin-top:8px;font-size:16px}
.del{background:#ff6b6b;padding:6px 10px;border-radius:8px;font-size:13px}
.task{display:flex;align-items:center;background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;gap:10px}
.task-text{flex:1;font-size:16px}
.task-done{text-decoration:line-through;color:#999}
.info{font-size:12px;color:#666;display:flex;gap:8px;margin-top:4px}
.pri{padding:2px 6px;border-radius:6px;color:#fff;font-size:12px}
.pri-h{background:#ff6b6b}
.pri-m{background:#ffaa33}
.pri-l{background:#82d9b9}
.header{text-align:center;font-size:20px;font-weight:bold;background:#82d9b9;color:#fff;padding:16px;border-radius:16px;margin-bottom:15px}
</style>
</head>
<body>

<div class="header">🐾 小任务</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text"><br>
  指派给<br>
  <input id="assign"><br>
  优先级<br>
  <select id="pri">
    <option value="h">高优先</option>
    <option value="m">中优先</option>
    <option value="l">低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
// ======================
// 你的信息已正确填写
// ======================
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(path, opts = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + path, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    ...opts
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let res = await api("/tasks?room=eq." + room + "&order=id.desc");
  render(await res.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    html += `
    <div class="task">
      <input type="checkbox" ${t.done ? "checked" : ""} onclick="toggle(${t.id}, ${t.done})">
      <div class="${t.done ? 'task-text task-done' : 'task-text'}">
        ${t.text}
        <div class="info">
          <span class="pri pri-${t.pri}">${t.pri == 'h' ? '高' : t.pri == 'm' ? '中' : '低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user || '无人'}</span>
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  if (!me || !text) { alert("请填写名字和任务"); return; }

  await api("/tasks", {
    method: "POST",
    body: JSON.stringify({
      room: document.getElementById("room").value,
      text: text,
      create_user: me,
      assign_user: document.getElementById("assign").value || "无人",
      pri: document.getElementById("pri").value,
      done: false
    })
  });

  document.getElementById("text").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq." + id, {
    method: "PATCH",
    body: JSON.stringify({ done: !done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq." + id, { method: "DELETE" });
  load();
}
</script>

</body>
</html>
