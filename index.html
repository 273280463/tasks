<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 小任务</title>
<style>
/* 全局基础 - 极简轻量 */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:#f8f9fa;padding:12px;max-width:500px;margin:0 auto;}

/* 顶部标题 - 精简 */
.header{
  background:#73C6B6;
  color:white;
  text-align:center;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:17px;
  font-weight:bold;
}

/* 输入卡片 - 紧凑 */
.card{
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}

/* 输入框/下拉框 - 精简 */
input,select{
  width:100%;
  padding:9px;
  border:1px solid #e5e5e5;
  border-radius:7px;
  margin:5px 0;
  font-size:14px;
}

/* 发布按钮 - 精简 */
button{
  width:100%;
  background:#73C6B6;
  color:white;
  border:none;
  padding:10px;
  border-radius:7px;
  margin-top:5px;
  font-size:14px;
}

/* ============================== */
/* 核心：小巧任务卡 + 信息分层排版 */
/* ============================== */
.task{
  background:white;
  padding:12px; /* 紧凑内边距 */
  border-radius:10px;
  margin-bottom:6px; /* 小间距适配多任务 */
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  display: grid;
  grid-template-columns: 25px 1fr 50px; /* 紧凑三列 */
  gap: 8px;
  align-items: start; /* 顶部对齐更整洁 */
}

/* 勾选框 - 小巧精致 */
.task-checkbox{
  width:16px;
  height:16px;
  cursor: pointer;
  margin-top:1px;
}

/* 任务内容区 - 分层排版 */
.task-content{
  width: 100%;
  overflow: hidden;
}

/* 任务标题 - 清晰醒目 */
.task-text{
  font-size:15px;
  line-height:1.3;
  margin-bottom:4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 完成任务样式 */
.task-done{
  text-decoration:line-through;
  color:#999;
}

/* 第一层：创建/指派/优先级（横向舒展） */
.task-meta{
  font-size:11px;
  color:#666;
  display:flex;
  flex-wrap: nowrap;
  gap:10px;
  align-items:center;
  margin-bottom:3px; /* 与时间区拉开小间距 */
  overflow: hidden;
}

/* 优先级标签 */
.pri{
  padding:1px 5px;
  border-radius:5px;
  color:white;
  font-size:10px;
  flex-shrink:0;
}
.pri-h{background:#FF5A5A;}
.pri-m{background:#FFB946;}
.pri-l{background:#73C6B6;}

/* 第二层：截止时间（独立下放） */
.task-deadline{
  font-size:11px;
  color:#FF5A5A;
  font-weight:bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 删除按钮 - 最小化 */
.del{
  width:45px;
  height:26px;
  background:#FF5A5A;
  color:white;
  border:none;
  padding:0;
  border-radius:5px;
  font-size:11px;
  flex-shrink:0;
  align-self:center; /* 垂直居中更协调 */
}
</style>
</head>
<body>

<div class="header">🐾 小任务</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text"><br>
  指派给<br>
  <input id="assign"><br>
  截止时间<br>
  <input type="datetime-local" id="deadline"><br>
  优先级<br>
  <select id="pri">
    <option value="h">高优先</option>
    <option value="m">中优先</option>
    <option value="l">低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg1NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(p, o = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + p, {
    headers: { apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY, "Content-Type":"application/json" },
    ...o
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let r = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await r.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    // 提取纯任务文字和时间
    let cleanText = t.text.replace(/\s*⏳.+$/, "");
    let deadline = "";
    const match = t.text.match(/⏳\s*截止：(\S+)/);
    if (match) {
      deadline = match[1].replace("T", " ");
    }

    // 拼接任务卡片HTML（截止时间独立下放）
    html += `
    <div class="task">
      <input type="checkbox" class="task-checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-content">
        <div class="task-text ${t.done?'task-done':''}">${cleanText}</div>
        <div class="task-meta">
          <span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user||'无人'}</span>
        </div>
        ${deadline ? `<div class="task-deadline">⏰ 截止：${deadline}</div>` : ""}
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  let deadline = document.getElementById("deadline").value;

  if (!me || !text) { alert("请填写名字和任务"); return; }

  let finalText = text;
  if (deadline) {
    finalText = text + " ⏳ 截止：" + deadline;
  }

  await api("/tasks", {
    method:"POST",
    body:JSON.stringify({
      room:document.getElementById("room").value,
      text:finalText,
      create_user:me,
      assign_user:document.getElementById("assign").value||"无人",
      pri:document.getElementById("pri").value,
      done:false
    })
  });

  // 清空输入框
  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method:"PATCH",
    body:JSON.stringify({ done:!done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq."+id, { method:"DELETE" });
  load();
}
</script>
</body>
</html>
