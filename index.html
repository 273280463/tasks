<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">

<meta name="apple-mobile-web-app-title" content="小任务">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, sans-serif}
body{background:#f7f8fc;padding:16px;max-width:500px;margin:0 auto;color:#333}

/* 顶部标题 */
.header{
  background:#82d9b9;
  color:white;
  text-align:center;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
  font-size:20px;
  font-weight:bold;
}

/* 卡片样式 */
.card{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

/* 输入框 */
input,select{
  width:100%;
  padding:12px;
  border:1px solid #eee;
  border-radius:12px;
  margin-top:8px;
  margin-bottom:8px;
  font-size:15px;
}

/* 按钮 */
button{
  width:100%;
  background:#82d9b9;
  color:white;
  border:none;
  padding:14px;
  border-radius:14px;
  margin-top:8px;
  font-size:16px;
  font-weight:500;
}

/* 任务卡片 */
.task{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:10px;
  display:flex;
  align-items:flex-start;
  gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.03);
}

/* 任务内容区域 */
.task-body{
  flex:1;
}

/* 任务文字 */
.task-text{
  font-size:16px;
  font-weight:500;
  margin-bottom:8px;
  line-height:1.3;
}

/* 已完成样式 */
.task-done{
  text-decoration:line-through;
  color:#999;
}

/* 任务信息行 */
.task-info{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  font-size:12px;
  color:#666;
  align-items:center;
}

/* 优先级标签 */
.pri{
  padding:3px 7px;
  border-radius:8px;
  color:white;
  font-size:11px;
}
.pri-h{background:#ff6b6b}
.pri-m{background:#ffb442}
.pri-l{background:#82d9b9}

/* 截止时间 */
.deadline{
  color:#ff6b6b;
  font-weight:600;
}

/* 删除按钮 */
.del{
  background:#ff6b6b;
  color:white;
  border:none;
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="header">🐾 小任务 · 实时同步</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text" placeholder="请输入任务内容"><br>

  指派给<br>
  <input id="assign" placeholder="选填"><br>

  截止时间<br>
  <input type="datetime-local" id="deadline"><br>

  优先级<br>
  <select id="pri">
    <option value="h">🔴 高优先</option>
    <option value="m">🟡 中优先</option>
    <option value="l">🟢 低优先</option>
  </select><br>

  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
// ======================
// 你的信息已自动填好
// ======================
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(path, opts = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + path, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    ...opts
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let res = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await res.json());
}

// 渲染任务（美化排版 + 时间）
function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    let timeText = t.deadline ? `<span class="deadline">截止：${t.deadline}</span>` : "";

    html += `
    <div class="task">
      <input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-body">
        <div class="task-text ${t.done?'task-done':''}">${t.text}</div>
        <div class="task-info">
          <span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user||'无人'}</span>
          ${timeText}
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// 发布任务（兼容旧数据库，不会崩溃）
async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  if (!me || !text) { alert("请填写名字和任务"); return; }

  let data = {
    room: document.getElementById("room").value,
    text: text,
    create_user: me,
    assign_user: document.getElementById("assign").value || "无人",
    pri: document.getElementById("pri").value,
    done: false
  };

  // 只有选择了时间才带上
  let d = document.getElementById("deadline").value;
  if (d) data.deadline = d;

  await api("/tasks", { method: "POST", body: JSON.stringify(data) });

  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method: "PATCH",
    body: JSON.stringify({ done: !done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq."+id, { method: "DELETE" });
  load();
}
</script>
</body>
</html>
