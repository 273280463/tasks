<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<!-- 图标 -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">

<meta name="apple-mobile-web-app-title" content="小任务">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f7f8fc;padding:16px;max-width:500px;margin:0 auto;color:#333}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
input,select{width:100%;padding:12px;border:1px solid #eee;border-radius:12px;margin-top:8px;font-size:15px}
button{width:100%;background:#82d9b9;color:#fff;border:none;padding:14px;border-radius:14px;margin-top:10px;font-size:16px}
.del{background:#ff6b6b;padding:8px 10px;border-radius:10px;font-size:13px}
.task{display:flex;align-items:center;background:#fff;padding:14px;border-radius:14px;margin-bottom:10px;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.task-info{flex:1}
.task-text{font-size:16px;font-weight:500;margin-bottom:4px}
.task-done .task-text{text-decoration:line-through;color:#999}
.info{font-size:12px;color:#888;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pri{padding:3px 8px;border-radius:10px;font-size:11px;color:#fff}
.pri-h{background:#ff6b6b}
.pri-m{background:#ffb442}
.pri-l{background:#82d9b9}
.deadline{color:#ff6b6b;font-weight:600}
.header{text-align:center;font-size:20px;font-weight:bold;color:#fff;background:#82d9b9;padding:18px;border-radius:18px;margin-bottom:16px}
</style>
</head>
<body>

<div class="header">🐾 小任务 · 实时同步</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text" placeholder="请输入任务"><br>
  指派给<br>
  <input id="assign" placeholder="可不填"><br>
  截止时间<br>
  <input type="datetime-local" id="deadline"><br>
  优先级<br>
  <select id="pri">
    <option value="h">🔴 高优先</option>
    <option value="m">🟡 中优先</option>
    <option value="l">🟢 低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
// ======================
// 你的信息已正确填写
// ======================
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(path, opts = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + path, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    ...opts
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

// ======================
// 修复：任务加载逻辑（恢复你原来能用的版本）
// ======================
async function load() {
  let room = document.getElementById("room").value;
  let res = await api("/tasks?room=eq." + room + "&order=id.desc");
  render(await res.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    html += `
    <div class="task ${t.done ? 'task-done' : ''}">
      <input type="checkbox" ${t.done ? "checked" : ""} onclick="toggle(${t.id}, ${t.done})">
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        <div class="info">
          <span class="pri pri-${t.pri}">${t.pri == 'h' ? '高' : t.pri == 'm' ? '中' : '低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user || '无人'}</span>
          ${t.deadline ? `<span class="deadline">截止：${t.deadline}</span>` : ''}
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// ======================
// 修复：发布任务（完全恢复）
// ======================
async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  if (!me || !text) {
    alert("请填写名字和任务");
    return;
  }

  await api("/tasks", {
    method: "POST",
    body: JSON.stringify({
      room: document.getElementById("room").value,
      text: text,
      create_user: me,
      assign_user: document.getElementById("assign").value || "无人",
      pri: document.getElementById("pri").value,
      deadline: document.getElementById("deadline").value,
      done: false
    })
  });

  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq." + id, {
    method: "PATCH",
    body: JSON.stringify({ done: !done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq." + id, { method: "DELETE" });
  load();
}
</script>

</body>
</html>
