<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<title>小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
body{background:#f7f8fc;padding:16px;max-width:500px;margin:0 auto;color:#333}

/* 任务卡片：横向布局，不再竖排 */
.task{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}

/* 任务内容区域 */
.task-content{
  flex:1;
}

/* 任务标题：横向显示 */
.task-title{
  font-size:17px;
  font-weight:500;
  margin-bottom:6px;
  line-height:1.3;
}

/* 已完成任务样式 */
.task-done{
  text-decoration:line-through;
  color:#999;
}

/* 任务信息行：紧凑排列 */
.task-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:12px;
  color:#666;
  align-items:center;
}

/* 优先级标签 */
.pri{
  padding:3px 8px;
  border-radius:10px;
  color:white;
  font-size:11px;
  font-weight:500;
}
.pri-h{background:#ff6b6b}
.pri-m{background:#ffb442}
.pri-l{background:#82d9b9}

/* 删除按钮 */
.del{
  background:#ff6b6b;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:500;
}

/* 其他原有样式保持不变 */
input,select{
  width:100%;
  padding:12px;
  border:1px solid #eee;
  border-radius:12px;
  margin:8px 0;
  font-size:15px;
}
button{
  width:100%;
  background:#82d9b9;
  color:white;
  border:none;
  padding:14px;
  border-radius:14px;
  margin-top:8px;
  font-size:16px;
  font-weight:500;
}
.header{
  background:#82d9b9;
  color:white;
  text-align:center;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
  font-size:20px;
  font-weight:bold;
}
.card{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
</style>
</head>
<body>

<h2>小任务</h2>

我的名字：<input id="me">
房间号：<input id="room" value="team1">
任务内容：<input id="text">
指派给：<input id="assign">
优先级：
<select id="pri">
  <option value="h">高</option>
  <option value="m">中</option>
  <option value="l">低</option>
</select>
<button onclick="add()">发布任务</button>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(p, o = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + p, {
    headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" },
    ...o
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let r = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await r.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    html += `
    <div class="task">
      <input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-content">
        <div class="task-title ${t.done?'task-done':''}">${t.text}</div>
        <div class="task-meta">
          <span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user||'无人'}</span>
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}
async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  if (!me || !text) { alert("请填写名字和任务"); return; }

  await api("/tasks", {
    method: "POST",
    body: JSON.stringify({
      room: document.getElementById("room").value,
      text: text,
      create_user: me,
      assign_user: document.getElementById("assign").value || "无人",
      pri: document.getElementById("pri").value,
      done: false
    })
  });

  document.getElementById("text").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method: "PATCH",
    body: JSON.stringify({ done: !done })
  });
  load();
}

async function del(id) {
  await api("/tasks?id=eq."+id, { method: "DELETE" });
  load();
}
</script>
</body>
</html>
