<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<!-- 我们约定好的可爱图标 -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/6154/6154853.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1006/1006594.png">

<meta name="apple-mobile-web-app-title" content="小任务">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 小任务 - 实时同步</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacFont,"Segoe UI",sans-serif}
body{background:#f9fafc;padding:16px;max-width:480px;margin:0 auto}
.header{background:#82d9b9;color:white;padding:18px;border-radius:20px;text-align:center;margin-bottom:16px}
.card{background:white;border-radius:18px;padding:16px;margin-bottom:12px}
input,select{width:100%;padding:11px;border:1px solid #eee;border-radius:12px;margin-top:6px}
button{width:100%;background:#82d9b9;color:white;border:none;padding:13px;border-radius:12px;margin-top:10px}
.task{background:white;border-radius:16px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.task-done{text-decoration:line-through;color:#999}
.info{font-size:12px;color:#666;margin-top:6px;display:flex;gap:8px}
.pri{padding:2px 6px;border-radius:4px;color:white}
.pri-h{background:red}
.pri-m{background:orange}
.pri-l{background:green}
.del{background:red;color:white;border:none;padding:6px 8px;border-radius:8px}
</style>
</head>
<body>

<div class="header">🐾 小任务 · 实时同步</div>

<div class="card">我的名字：<input id="me" oninput="localStorage.setItem('me',this.value)"></div>
<div class="card">房间号：<input id="room" value="team1"></div>

<div class="card">
  任务：<input id="text">
  指派：<input id="assign">
  优先级：
  <select id="pri">
    <option value="h">高</option>
    <option value="m">中</option>
    <option value="l">低</option>
  </select>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
// ======================
// 这里 ！！！ 一定要填回你自己的 SUPABASE 信息！！！
// ======================
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(path, opts={}) {
return fetch(SUPABASE_URL+"/rest/v1"+path, {
headers: { apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY, "Content-Type":"application/json" },
...opts
});
}

window.onload=()=>{
document.getElementById("me").value=localStorage.getItem("me")||"";
load(); setInterval(load,3000);
};

async function load(){
let r=await api("/tasks?room=eq."+document.getElementById("room").value);
render(await r.json());
}

function render(ts){
let h="";
ts.forEach(t=>{
h+=`<div class="task ${t.done?'task-done':''}">
<input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
<div style="flex:1"><div>${t.text}</div>
<div class="info">
<span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
<span>创建：${t.create_user}</span>
<span>指派：${t.assign_user}</span>
</div></div>
<button class="del" onclick="del(${t.id})">删</button>
</div>`;
});
document.getElementById("list").innerHTML=h;
}

async function add(){
let me=document.getElementById("me").value;
let t=document.getElementById("text").value;
if(!me||!t){alert("填名字和任务");return}
await api("/tasks",{method:"POST",body:JSON.stringify({
room:document.getElementById("room").value,
text:t,
create_user:me,
assign_user:document.getElementById("assign").value||"无人",
pri:document.getElementById("pri").value,
done:false
})});
document.getElementById("text").value="";
document.getElementById("assign").value="";
load();
}

async function toggle(id,d){
await api("/tasks?id=eq."+id,{method:"PATCH",body:JSON.stringify({done:!d})});
load();
}

async function del(id){
if(!confirm("确定？"))return;
await api("/tasks?id=eq."+id,{method:"DELETE"});
load();
}
</script>
</body>
</html>
