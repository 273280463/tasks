<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1049/1049319.png">
<meta name="apple-mobile-app-title" content="小任务">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f9fafb;padding:20px;max-width:500px;margin:0 auto;}

/* 顶部 */
.header{
  background:#73C6B6;
  color:white;
  text-align:center;
  padding:22px;
  border-radius:22px;
  margin-bottom:18px;
  font-size:21px;
  font-weight:bold;
}

/* 卡片 */
.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.04);
}

/* 输入框 */
input,select{
  width:100%;
  padding:12px;
  border:1px solid #eee;
  border-radius:12px;
  margin:8px 0;
  font-size:15px;
}

/* 按钮 */
button{
  width:100%;
  background:#73C6B6;
  color:white;
  border:none;
  padding:15px;
  border-radius:15px;
  font-size:16px;
  margin-top:5px;
}

/* ============================== */
/* 任务样式：绝对舒展、不挤、好看 */
/* ============================== */
.task{
  background:white;
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  display:flex;
  align-items:flex-start;
  gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.03);
}
.task-content{flex:1;}
.task-text{
  font-size:17px;
  font-weight:500;
  line-height:1.4;
  margin-bottom:12px;
}
.task-done{
  text-decoration:line-through;
  color:#999;
}

/* 信息栏：宽松、自动换行、绝对不挤 */
.task-info{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:12px;
  color:#666;
}
.task-info-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

/* 优先级标签 */
.pri{
  padding:4px 8px;
  border-radius:8px;
  color:white;
  font-size:11px;
  font-weight:500;
}
.pri-h{background:#ff6b6b;}
.pri-m{background:#ffb442;}
.pri-l{background:#73C6B6;}

/* 时间样式 */
.deadline{
  color:#ff6b6b;
  font-weight:600;
}

/* 删除按钮 */
.del{
  background:#ff6b6b;
  color:white;
  border:none;
  padding:9px 12px;
  border-radius:10px;
  font-size:13px;
  align-self:center;
}
</style>
</head>
<body>

<div class="header">🐾 小任务</div>

<div class="card">我的名字<br><input id="me" oninput="localStorage.setItem('me',this.value)"></div>
<div class="card">房间号<br><input id="room" value="team1"></div>

<div class="card">
  任务内容<br><input id="text"><br>
  指派给<br><input id="assign"><br>
  截止时间<br><input type="datetime-local" id="deadline"><br>
  优先级<br>
  <select id="pri">
    <option value="h">🔴 高优先</option>
    <option value="m">🟡 中优先</option>
    <option value="l">🟢 低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6Ik200F10iJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(p, o = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + p, {
    headers: { apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY, "Content-Type":"application/json" },
    ...o
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let r = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await r.json());
}

// ==============================
// 完美排版：时间在下方 + 不挤
// ==============================
function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    let realText = t.text.replace(/\s*⏳.+$/,"");
    let deadline = "";
    let match = t.text.match(/⏳\s*截止：(.+)/);
    if (match) deadline = match[1].replace("T"," ");

    html += `
    <div class="task">
      <input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-content">
        <div class="task-text ${t.done?"task-done":""}">${realText}</div>
        <div class="task-info">
          <div class="task-info-row">
            <span class="pri pri-${t.pri}">${t.pri=="h"?"高":t.pri=="m"?"中":"低"}</span>
            <span>创建：${t.create_user}</span>
            <span>指派：${t.assign_user||"无人"}</span>
          </div>
          ${deadline?`<div class="task-info-row"><span class="deadline">⏰ 截止：${deadline}</span></div>`:""}
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// ==============================
// 发布任务（干净无多余符号）
// ==============================
async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  let deadline = document.getElementById("deadline").value;

  if (!me || !text) { alert("请填写名字和任务"); return; }

  let showText = text;
  if (deadline) showText = text + " ⏳ 截止：" + deadline;

  await api("/tasks", {
    method:"POST",
    body:JSON.stringify({
      room:document.getElementById("room").value,
      text:showText,
      create_user:me,
      assign_user:document.getElementById("assign").value||"无人",
      pri:document.getElementById("pri").value,
      done:false
    })
  });

  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method:"PATCH",
    body:JSON.stringify({ done:!done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq."+id, { method:"DELETE" });
  load();
}
</script>
</body>
</html>
