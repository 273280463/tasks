<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 小任务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f7f8fc;padding:16px;max-width:500px;margin:0 auto;}

.header{
  background:#82d9b9;
  color:white;
  text-align:center;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
  font-size:20px;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

input,select{
  width:100%;
  padding:12px;
  border:1px solid #eee;
  border-radius:12px;
  margin:8px 0;
  font-size:15px;
}

button{
  width:100%;
  background:#82d9b9;
  color:white;
  border:none;
  padding:14px;
  border-radius:14px;
  margin-top:8px;
  font-size:16px;
  font-weight:500;
}

.task{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}

.task-content{
  flex:1;
}

.task-text{
  font-size:16px;
  margin-bottom:6px;
}

.task-done{
  text-decoration:line-through;
  color:#999;
}

.task-info{
  font-size:12px;
  color:#888;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.pri{
  padding:3px 7px;
  border-radius:8px;
  color:white;
  font-size:11px;
}
.pri-h{background:#ff6b6b}
.pri-m{background:#ffb442}
.pri-l{background:#82d9b9}

.deadline{
  color:#ff6b6b;
  font-weight:bold;
}

.del{
  background:#ff6b6b;
  color:white;
  border:none;
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="header">🐾 小任务</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text"><br>
  指派给<br>
  <input id="assign"><br>
  截止时间<br>
  <input type="datetime-local" id="deadline"><br>
  优先级<br>
  <select id="pri">
    <option value="h">高优先</option>
    <option value="m">中优先</option>
    <option value="l">低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg0NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(p, o = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + p, {
    headers: { apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY, "Content-Type":"application/json" },
    ...o
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let r = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await r.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    let cleanText = t.text.replace(/\s*⏳.+$/, "");
    let deadline = "";
    const match = t.text.match(/⏳\s*截止：(\S+)/);
    if (match) {
      deadline = match[1].replace("T", " ");
    }

    html += `
    <div class="task">
      <input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-content">
        <div class="task-text ${t.done?'task-done':''}">${cleanText}</div>
        <div class="task-info">
          <span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
          <span>创建：${t.create_user}</span>
          <span>指派：${t.assign_user||'无人'}</span>
          ${deadline ? `<span class="deadline">⏰ ${deadline}</span>` : ""}
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  let deadline = document.getElementById("deadline").value;

  if (!me || !text) { alert("请填写名字和任务"); return; }

  let finalText = text;
  if (deadline) {
    finalText = text + " ⏳ 截止：" + deadline;
  }

  await api("/tasks", {
    method:"POST",
    body:JSON.stringify({
      room:document.getElementById("room").value,
      text:finalText,
      create_user:me,
      assign_user:document.getElementById("assign").value||"无人",
      pri:document.getElementById("pri").value,
      done:false
    })
  });

  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method:"PATCH",
    body:JSON.stringify({ done:!done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq."+id, { method:"DELETE" });
  load();
}
</script>
</body>
</html>
