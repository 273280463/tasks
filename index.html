<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 小任务</title>
<style>
/* 全局基础 - 极简轻量 */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:#f8f9fa;padding:12px;max-width:500px;margin:0 auto;}

/* 顶部标题 - 精简 */
.header{
  background:#73C6B6;
  color:white;
  text-align:center;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:17px;
  font-weight:bold;
}

/* 输入卡片 - 紧凑 */
.card{
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}

/* 输入框/下拉框 - 精简 */
input,select{
  width:100%;
  padding:9px;
  border:1px solid #e5e5e5;
  border-radius:7px;
  margin:5px 0;
  font-size:14px;
}

/* 发布按钮 - 精简 */
button{
  width:100%;
  background:#73C6B6;
  color:white;
  border:none;
  padding:10px;
  border-radius:7px;
  margin-top:5px;
  font-size:14px;
}

/* ============================== */
/* 核心：小巧任务卡 + 横向舒展排版 */
/* ============================== */
.task{
  background:white;
  padding:12px; /* 缩减内边距，卡片更小 */
  border-radius:10px;
  margin-bottom:6px; /* 减小卡片间距 */
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  display: grid;
  grid-template-columns: 25px 1fr 50px; /* 更紧凑的三列布局 */
  gap: 8px; /* 缩小元素间距 */
  align-items: center; /* 垂直居中，更紧凑 */
}

/* 勾选框 - 更小更精致 */
.task-checkbox{
  width:16px;
  height:16px;
  cursor: pointer;
}

/* 任务内容区 - 核心排版 */
.task-content{
  width: 100%;
  overflow: hidden; /* 防止内容溢出 */
}

/* 任务标题 - 精简但清晰 */
.task-text{
  font-size:15px;
  line-height:1.3;
  margin-bottom:4px; /* 缩减标题和信息栏间距 */
  white-space: nowrap; /* 单行显示，横向舒展 */
  overflow: hidden;
  text-overflow: ellipsis; /* 超长文字省略，不挤 */
}

/* 完成任务样式 */
.task-done{
  text-decoration:line-through;
  color:#999;
}

/* 信息栏 - 横向完全舒展，不挤团 */
.task-info{
  font-size:11px; /* 缩小字号但保证可读 */
  color:#666;
  display:flex;
  flex-wrap: nowrap; /* 强制横向排列 */
  gap:10px; /* 拉开信息间距，不挤 */
  align-items:center;
  overflow: hidden;
}

/* 优先级标签 - 小巧 */
.pri{
  padding:1px 5px;
  border-radius:5px;
  color:white;
  font-size:10px;
  flex-shrink:0; /* 不压缩 */
}
.pri-h{background:#FF5A5A;}
.pri-m{background:#FFB946;}
.pri-l{background:#73C6B6;}

/* 截止时间 - 突出但不占空间 */
.deadline{
  color:#FF5A5A;
  font-weight:bold;
  flex-shrink:0; /* 不压缩 */
  white-space: nowrap;
}

/* 创建/指派信息 - 横向舒展 */
.task-meta{
  flex-shrink:1; /* 可适度压缩，保证整体不挤 */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 删除按钮 - 最小化，不抢空间 */
.del{
  width:45px;
  height:26px;
  background:#FF5A5A;
  color:white;
  border:none;
  padding:0;
  border-radius:5px;
  font-size:11px;
  flex-shrink:0;
}
</style>
</head>
<body>

<div class="header">🐾 小任务</div>

<div class="card">
  我的名字<br>
  <input id="me" oninput="localStorage.setItem('me',this.value)">
</div>

<div class="card">
  房间号<br>
  <input id="room" value="team1">
</div>

<div class="card">
  任务内容<br>
  <input id="text"><br>
  指派给<br>
  <input id="assign"><br>
  截止时间<br>
  <input type="datetime-local" id="deadline"><br>
  优先级<br>
  <select id="pri">
    <option value="h">高优先</option>
    <option value="m">中优先</option>
    <option value="l">低优先</option>
  </select><br>
  <button onclick="add()">➕ 发布任务</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://dkxxrhdzedvdxbycwczd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreHhyaGR6ZWR2ZHhieWN3Y3pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzExMzgsImV4cCI6MjA4ODg1NzEzOH0.Od5jKG-y_8hQd-BvyalAJoencJPFCn9iRDptCn1foiE";

async function api(p, o = {}) {
  return fetch(SUPABASE_URL + "/rest/v1" + p, {
    headers: { apikey:SUPABASE_KEY, Authorization:"Bearer "+SUPABASE_KEY, "Content-Type":"application/json" },
    ...o
  });
}

window.onload = () => {
  document.getElementById("me").value = localStorage.getItem("me") || "";
  load();
  setInterval(load, 3000);
};

async function load() {
  let room = document.getElementById("room").value;
  let r = await api("/tasks?room=eq."+room+"&order=id.desc");
  render(await r.json());
}

function render(tasks) {
  let html = "";
  tasks.forEach(t => {
    // 提取纯任务文字和时间
    let cleanText = t.text.replace(/\s*⏳.+$/, "");
    let deadline = "";
    const match = t.text.match(/⏳\s*截止：(\S+)/);
    if (match) {
      deadline = match[1].replace("T", " ");
    }

    // 拼接任务卡片HTML（优化信息排版）
    html += `
    <div class="task">
      <input type="checkbox" class="task-checkbox" ${t.done?"checked":""} onclick="toggle(${t.id},${t.done})">
      <div class="task-content">
        <div class="task-text ${t.done?'task-done':''}">${cleanText}</div>
        <div class="task-info">
          <span class="pri pri-${t.pri}">${t.pri=='h'?'高':t.pri=='m'?'中':'低'}</span>
          <span class="task-meta">创建：${t.create_user}</span>
          <span class="task-meta">指派：${t.assign_user||'无人'}</span>
          ${deadline ? `<span class="deadline">⏰ ${deadline}</span>` : ""}
        </div>
      </div>
      <button class="del" onclick="del(${t.id})">删</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

async function add() {
  let me = document.getElementById("me").value;
  let text = document.getElementById("text").value;
  let deadline = document.getElementById("deadline").value;

  if (!me || !text) { alert("请填写名字和任务"); return; }

  let finalText = text;
  if (deadline) {
    finalText = text + " ⏳ 截止：" + deadline;
  }

  await api("/tasks", {
    method:"POST",
    body:JSON.stringify({
      room:document.getElementById("room").value,
      text:finalText,
      create_user:me,
      assign_user:document.getElementById("assign").value||"无人",
      pri:document.getElementById("pri").value,
      done:false
    })
  });

  // 清空输入框
  document.getElementById("text").value = "";
  document.getElementById("assign").value = "";
  document.getElementById("deadline").value = "";
  load();
}

async function toggle(id, done) {
  await api("/tasks?id=eq."+id, {
    method:"PATCH",
    body:JSON.stringify({ done:!done })
  });
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  await api("/tasks?id=eq."+id, { method:"DELETE" });
  load();
}
</script>
</body>
</html>
